services:
  - type: web
    name: shl-assessment-recommender
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_TF
        value: "NO"
      - key: USE_TORCH
        value: "YES"
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: "python"
    plan: free
